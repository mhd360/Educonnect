<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
        (function () {
            const saved = localStorage.getItem("ec-theme") || "dark";
            document.documentElement.setAttribute("data-theme", saved);
        })();
    </script>

    <link rel="icon" href="../icons/logo_EC.png" type="image/png" />
    <link rel="stylesheet" href="../styles/reset.css" />
    <link rel="stylesheet" href="../styles/typography.css" />
    <link rel="stylesheet" href="../styles/globalStyles.css" />
    <link rel="stylesheet" href="../styles/aluno.css" />
    <title>EC - Página do aluno</title>
</head>

<body>
    <header class="header site-header container">
        <div class="brand">
            <h1 class="title1 logo"><span>Edu</span>Connect</h1>
            <!-- <img src="../icons/EC-Logo-png.png" alt="Logo EduConnect" class="logo_img"> -->
        </div>

        <nav class="header-nav" aria-label="Navegação principal">
            <ul>
                <li><a href="#" class="text2 nav-link is-active" data-section="dashboard">Dashboard</a></li>
                <li><a href="#" class="text2 nav-link" data-section="notas">Notas</a></li>
                <li><a href="#" class="text2 nav-link" data-section="atividades">Atividades</a></li>
                <li><a href="#" class="text2 nav-link" data-section="calendario">Calendário</a></li>
            </ul>
        </nav>

        <div class="menu">
            <button class="theme-btn" id="theme-btn" type="button">
                <img src="../icons/white_sun.svg" alt="ícone de sol" id="theme-img" />
            </button>

            <div class="profile-menu-wrapper">
                <button type="button" class="profile-btn" id="profileBtn" aria-label="Abrir menu do perfil"
                    aria-expanded="false">
                    <svg id="profileIcon" class="profile-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M20 21a8 8 0 0 0-16 0"></path>
                        <circle cx="12" cy="8" r="4"></circle>
                    </svg>
                </svg>

                <div class="profile-dropdown" id="profileDropdown">
                    <div class="profile-info">
                        <p class="text3 profile-label">Nome</p>
                        <p class="text2 profile-value" id="profileNome">-</p>

                        <p class="text3 profile-label">Matrícula</p>
                        <p class="text2 profile-value" id="profileMatricula">-</p>

                        <p class="text3 profile-label">Turma</p>
                        <p class="text2 profile-value" id="profileTurma">-</p>
                    </div>

                    <div class="profile-actions">
                        <button type="button" class="text2 profile-action-btn" id="changePasswordBtn">
                            Alterar senha
                        </button>
                        <button type="button" class="text2 profile-action-btn danger" id="logoutBtn">
                            Sair
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="container main-container">
        <!-- Área dinâmica -->
        <section id="alunoSectionHost" class="container with-offset" aria-live="polite">
            <div class="text2 welcome-text">Carregando...</div>
        </section>
    </main>

    <footer>
        <div class="container faq-section">
            <p class="text3">Encontrou algum problema? Entre em contato conosco:</p>
            <a class="text3 faq-link" href="/">FAQ</a>
        </div>
        <p class="text3 direitos">&copy; 2025 EduConnect. Todos os direitos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js" defer></script>
    <script src="../js/theme.js" defer></script>
    <script src="../js/auth.js" defer></script>
    <script src="../js/services/alunoService.js" defer></script>
    <script src="../js/aluno-page.js" defer></script>
</body>

</html>
