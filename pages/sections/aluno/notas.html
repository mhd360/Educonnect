<h2 id="notas" class="titleMid section-title with-offset">Notas</h2>

<section class="container notas-section">
  <!-- Tabela (antigo Boletim) -->
  <section class="container info-container">
    <table id="gradesTable">
      <tr class="table-header">
        <th class="title3 table-title">Disciplina</th>
        <th class="title3 table-title">P1</th>
        <th class="title3 table-title">P2</th>
        <th class="title3 table-title">P3</th>
        <th class="title3 table-title">FINAL</th>
      </tr>
      <!-- linhas via JS/API -->
    </table>
  </section>

  <!-- Gráfico (mantém o mesmo) -->
  <section class="chart-section container">
    <div class="chart-header">
      <label class="title3" for="subjectSelect">Selecione a disciplina:</label>
      <select class="text2 subject-select" id="subjectSelect"></select>
    </div>

    <div class="chart-container">
      <canvas id="gradesChart"></canvas>
    </div>
  </section>
</section>
